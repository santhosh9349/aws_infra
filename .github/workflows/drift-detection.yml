name: Terraform Drift Detection

on:
  repository_dispatch:
    types: [drift-check]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check for drift'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  TF_VERSION: '1.5.7'
  AWS_REGION: 'eu-west-2'

jobs:
  drift-detection:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      id-token: write    # Required for OIDC authentication
      contents: read     # Required for checkout
      issues: write      # Required for creating issues
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017373135945:role/github_oidc_drift
          role-session-name: DriftDetectionSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          cd scripts/drift-detection
          if [ -f requirements.txt ]; then
             pip install -r requirements.txt
          else
             echo "requirements.txt not found, skipping dependency installation"
          fi

      - name: Terraform Init
        id: init
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init -input=false

      - name: Terraform Plan (Drift Detection)
        id: plan
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: |
          set +e
          MAX_RETRIES=2
          RETRY_DELAY=300  # 5 minutes
          
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Terraform plan attempt $attempt of $MAX_RETRIES"
            
            # Note: Terraform Cloud doesn't support -out flag, so we just detect changes
            terraform plan -detailed-exitcode -input=false -no-color 2>&1 | tee /tmp/plan_output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            
            # Check for state lock error
            if grep -q "Error acquiring the state lock\|Error locking state\|Lock Info:" /tmp/plan_output.txt; then
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "⏳ State lock detected, waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
                continue
              else
                echo "❌ State lock persisted after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
            
            # Process exit code (only reached if no lock error)
            break
          done
          
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Save plan output for later use
          cp /tmp/plan_output.txt ${{ github.workspace }}/plan_output.txt
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No drift detected - infrastructure matches Terraform state"
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "❌ Terraform plan failed with an error"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ Drift detected - infrastructure differs from Terraform state"
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check for plan errors
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan failed. Check the logs above for details."
          exit 1

      - name: Parse Terraform Plan
        id: parse
        if: steps.plan.outputs.exit_code == '2'
        run: |
          PLAN_FILE="${{ github.workspace }}/plan_output.txt"
          
          # Count occurrences of actions in the plan output
          # Note: These patterns match standard Terraform plan output structure
          create_count=$(awk '/ will be created/ {count++} END {print count+0}' "$PLAN_FILE")
          update_count=$(awk '/ will be updated in-place/ {count++} END {print count+0}' "$PLAN_FILE")
          delete_count=$(awk '/ will be destroyed/ {count++} END {print count+0}' "$PLAN_FILE")
          replace_count=$(awk '/ must be replaced/ {count++} END {print count+0}' "$PLAN_FILE")
          
          total_count=$((create_count + update_count + delete_count + replace_count))
          
          echo "create_count=$create_count" >> $GITHUB_OUTPUT
          echo "update_count=$update_count" >> $GITHUB_OUTPUT
          echo "delete_count=$delete_count" >> $GITHUB_OUTPUT
          echo "replace_count=$replace_count" >> $GITHUB_OUTPUT
          echo "total_count=$total_count" >> $GITHUB_OUTPUT
          
          echo "Plan Summary: $create_count creates, $update_count updates, $delete_count deletes, $replace_count replacements."

      - name: Extract Drifted Resource ARNs
        id: extract_ids
        if: steps.plan.outputs.exit_code == '2'
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: |
          echo "=== Step 1: Extracting resource ARNs for CloudTrail attribution ==="
          PLAN_FILE="${{ github.workspace }}/plan_output.txt"
          RESOURCE_FILE="/tmp/resource_ids.txt"
          > "$RESOURCE_FILE"

          # Helper function: Check if a string is an AWS ARN
          is_arn() {
            local str="$1"
            # AWS ARN format: arn:partition:service:region:account-id:resource
            # - Partition: aws, aws-cn (China), aws-us-gov (GovCloud)
            # - Service: lowercase letters, numbers, hyphens (e.g., ec2, elasticloadbalancing)
            # - Region: lowercase letters, numbers, hyphens, or empty (e.g., us-east-1, cn-north-1, or empty for global services)
            # - Account ID: exactly 12 digits, empty (for S3), or 'aws' (for AWS managed IAM policies)
            # - Resource: any characters (includes paths, IDs, etc.)
            # Reference: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference-arns.html
            [[ "$str" =~ ^arn:(aws|aws-cn|aws-us-gov):[a-z0-9-]+:[a-z0-9-]*:(([0-9]{12})|aws|):.+ ]]
          }

          # --- Debug: Show plan lines that contain "will be" to understand format ---
          echo "--- DEBUG: Lines containing 'will be' in plan output ---"
          grep -n "will be" "$PLAN_FILE" | head -30 || echo "(no matches)"
          echo "--- END DEBUG ---"

          # --- Step 1a: Extract changed resource addresses from plan text ---
          # IMPORTANT: Do NOT strip quotes - state JSON uses module.vpc["dev"] format
          # and addresses must match exactly
          sed -nE 's/^\s+#\s(\S+)\s+(will be|must be|has changed).*/\1/p' "$PLAN_FILE" \
            | sort -u > /tmp/changed_addresses.txt || true

          ADDR_COUNT=$(wc -l < /tmp/changed_addresses.txt | tr -d ' ')
          echo "Found $ADDR_COUNT changed resource addresses:"
          cat /tmp/changed_addresses.txt

          if [ "$ADDR_COUNT" -eq 0 ]; then
            echo "⚠️ No addresses extracted from plan. Trying alternative pattern..."
            # Fallback: broader grep — keep quotes intact
            grep -E "(will be created|will be destroyed|will be updated|must be replaced)" "$PLAN_FILE" \
              | grep '#' \
              | sed 's/.*#\s*//' | awk '{print $1}' | sort -u > /tmp/changed_addresses.txt || true
            
            ADDR_COUNT=$(wc -l < /tmp/changed_addresses.txt | tr -d ' ')
            echo "Fallback found $ADDR_COUNT addresses:"
            cat /tmp/changed_addresses.txt
          fi

          if [ "$ADDR_COUNT" -eq 0 ]; then
            echo "❌ Could not extract any resource addresses from plan output."
            exit 0
          fi

          # --- Step 1b: Extract ARNs/IDs from "Refreshing state..." lines in plan output ---
          # These lines appear during the refresh phase and contain the actual resource IDs
          # Format: module.vpc["dev"].aws_vpc.this: Refreshing state... [id=vpc-xxx]
          echo ""
          echo "Parsing plan output for 'Refreshing state' IDs/ARNs..."
          declare -A REFRESH_IDS
          declare -A REFRESH_ARNS
          while IFS= read -r line; do
            addr=$(echo "$line" | sed -E 's/^([^:]+): Refreshing state.*/\1/')
            rid=$(echo "$line" | sed -E 's/.*\[id=([^\]]+)\].*/\1/')
            if [ -n "$addr" ] && [ -n "$rid" ]; then
              REFRESH_IDS["$addr"]="$rid"
              # If the ID looks like an ARN (starts with arn:), store it as ARN too
              if is_arn "$rid"; then
                REFRESH_ARNS["$addr"]="$rid"
                echo "  📋 Refresh ARN: $addr → $rid"
              else
                echo "  📋 Refresh ID: $addr → $rid"
              fi
            fi
          done < <(grep 'Refreshing state\.\.\. \[id=' "$PLAN_FILE" 2>/dev/null || true)
          echo "Found ${#REFRESH_IDS[@]} IDs (${#REFRESH_ARNS[@]} ARNs) from refresh lines"

          # --- Step 1c: Extract resource names from plan output for "will be created" ---
          # For resources being created (previously deleted), extract the "name" attribute
          # from the plan block as a fallback identifier for CloudTrail lookup
          echo ""
          echo "Extracting resource names from plan output for 'will be created' resources..."
          declare -A RESOURCE_NAMES
          current_addr=""
          while IFS= read -r line; do
            # Match resource header: # module.xxx.aws_yyy.zzz will be created
            if echo "$line" | grep -qE '^\s+#\s+.+\s+(will be|must be|has changed)'; then
              current_addr=$(echo "$line" | sed -E 's/^\s+#\s(\S+)\s+(will be|must be|has changed).*/\1/')
            fi
            # Match name attribute: + name = "some-name"
            if [ -n "$current_addr" ] && echo "$line" | grep -qE '^\s+\+\s+name\s+=\s+"[^"]+"'; then
              rname=$(echo "$line" | sed -E 's/.*name\s+=\s+"([^"]+)".*/\1/')
              if [ -n "$rname" ]; then
                RESOURCE_NAMES["$current_addr"]="$rname"
                current_addr=""
              fi
            fi
          done < "$PLAN_FILE"
          echo "Found ${#RESOURCE_NAMES[@]} resource names from plan attributes"

          # --- Step 1d: Pull state from Terraform Cloud ---
          echo ""
          echo "Pulling state from Terraform Cloud..."
          if terraform state pull > /tmp/state_raw.json 2>/dev/null; then
            STATE_SIZE=$(wc -c < /tmp/state_raw.json | tr -d ' ')
            RESOURCE_COUNT=$(jq '.resources | length' /tmp/state_raw.json 2>/dev/null || echo "0")
            echo "✅ State pulled successfully ($STATE_SIZE bytes, $RESOURCE_COUNT resources)"
          else
            echo "⚠️ Failed to pull state from Terraform Cloud (continuing with refresh IDs)"
            echo '{"resources":[]}' > /tmp/state_raw.json
          fi

          # --- Debug: Show all addresses available in state ---
          echo ""
          echo "--- DEBUG: All resource addresses in state ---"
          jq -r '.resources[] | (if .module then .module + "." else "" end) + .type + "." + .name' /tmp/state_raw.json 2>/dev/null | head -40
          echo "--- END DEBUG ---"

          # --- Step 1e: For each changed address, find its ARN/ID using all sources ---
          while read -r address; do
            [ -z "$address" ] && continue
            echo ""
            echo "Looking up ARN/ID for: $address"

            id=""
            arn=""

            # Priority 1: Check refresh line ARNs (most reliable - directly from plan output)
            if [ -n "${REFRESH_ARNS[$address]+x}" ]; then
              arn="${REFRESH_ARNS[$address]}"
              echo "  ✅ Found ARN (from refresh line): $arn"
            fi

            # Priority 2: Check refresh line IDs if no ARN yet
            if [ -z "$arn" ] && [ -n "${REFRESH_IDS[$address]+x}" ]; then
              id="${REFRESH_IDS[$address]}"
              # Check if this ID is actually an ARN
              if is_arn "$id"; then
                arn="$id"
                echo "  ✅ Found ARN (from refresh ID): $arn"
              else
                echo "  ✅ Found ID (from refresh line): $id"
              fi
            fi

            # Priority 3: State JSON lookup - prefer ARN over ID
            # Check multiple possible ARN field names: arn, policy_arn, or any *_arn field
            if [ -z "$arn" ]; then
              arn=$(jq -r --arg addr "$address" '
                .resources[] |
                select(((if .module then .module + "." else "" end) + .type + "." + .name) == $addr) |
                .instances[0].attributes |
                # Try standard .arn first, then policy_arn, then any field ending in _arn
                (.arn // .policy_arn // (to_entries[] | select(.key | endswith("_arn")) | .value) // empty) |
                select(. != null and . != "")
              ' /tmp/state_raw.json 2>/dev/null | head -1) || true
              
              if [ -n "$arn" ] && [ "$arn" != "null" ] && [ "$arn" != "" ]; then
                # Validate that it's actually an ARN
                if is_arn "$arn"; then
                  echo "  ✅ Found ARN (from state JSON): $arn"
                else
                  echo "  ⚠️ Found ARN-like field but not valid ARN format: $arn"
                  arn=""
                fi
              else
                arn=""
              fi
            fi

            # Priority 4: State JSON lookup for ID if no ARN
            if [ -z "$id" ] && [ -z "$arn" ]; then
              id=$(jq -r --arg addr "$address" '
                .resources[] |
                select(((if .module then .module + "." else "" end) + .type + "." + .name) == $addr) |
                .instances[0].attributes.id // empty
              ' /tmp/state_raw.json 2>/dev/null) || true
              
              if [ -n "$id" ] && [ "$id" != "null" ] && [ "$id" != "" ]; then
                # Check if the ID is actually an ARN
                if is_arn "$id"; then
                  arn="$id"
                  id=""
                  echo "  ✅ Found ARN (from state JSON id field): $arn"
                else
                  echo "  ✅ Found ID (from state JSON): $id"
                fi
              else
                id=""
              fi
            fi

            # Priority 5: State JSON lookup handling for_each resources with index_key
            if [ -z "$id" ] && [ -z "$arn" ]; then
              result=$(jq -r --arg addr "$address" '
                .resources[] |
                . as $res |
                .instances[] |
                (
                  (if $res.module then $res.module + "." else "" end) +
                  $res.type + "." + $res.name +
                  (if .index_key then "[\"" + (.index_key | tostring) + "\"]" else "" end)
                ) as $full_addr |
                select($full_addr == $addr) |
                (.attributes.arn // .attributes.id // empty)
              ' /tmp/state_raw.json 2>/dev/null) || true

              if [ -n "$result" ] && [ "$result" != "null" ] && [ "$result" != "" ]; then
                if is_arn "$result"; then
                  arn="$result"
                  echo "  ✅ Found ARN (from state JSON with index_key): $arn"
                else
                  id="$result"
                  echo "  ✅ Found ID (from state JSON with index_key): $id"
                fi
              fi
            fi

            # Priority 6: terraform state show fallback
            if [ -z "$id" ] && [ -z "$arn" ]; then
              # First try to get ARN
              arn=$(terraform state show -no-color "$address" 2>/dev/null \
                | grep -E '^\s+arn\s+=' | head -1 \
                | sed 's/.*=\s*//' | tr -d '"' | xargs) || true

              if [ -n "$arn" ] && [ "$arn" != "null" ] && [ "$arn" != "" ]; then
                echo "  ✅ Found ARN (from terraform state show): $arn"
              else
                # Try to get ID as fallback
                id=$(terraform state show -no-color "$address" 2>/dev/null \
                  | grep -E '^\s+id\s+=' | head -1 \
                  | sed 's/.*=\s*//' | tr -d '"' | xargs) || true

                if [ -n "$id" ] && [ "$id" != "null" ] && [ "$id" != "" ]; then
                  echo "  ✅ Found ID (from terraform state show): $id"
                else
                  id=""
                fi
              fi
            fi

            # Priority 7: Use resource name from plan output as fallback identifier
            if [ -z "$id" ] && [ -z "$arn" ] && [ -n "${RESOURCE_NAMES[$address]+x}" ]; then
              id="${RESOURCE_NAMES[$address]}"
              echo "  ℹ️ Using resource name as identifier: $id"
            fi

            # Store ARN if found, otherwise store ID
            if [ -n "$arn" ] && [ "$arn" != "null" ] && [ "$arn" != "" ]; then
              echo "$address|arn|$arn" >> "$RESOURCE_FILE"
              echo "  ✅ EXTRACTED ARN: $arn"
            elif [ -n "$id" ] && [ "$id" != "null" ] && [ "$id" != "" ]; then
              echo "$address|id|$id" >> "$RESOURCE_FILE"
              echo "  ✅ EXTRACTED ID: $id"
            else
              echo "  ❌ Could not resolve ARN or ID for $address"
            fi
          done < /tmp/changed_addresses.txt

          echo ""
          echo "=== Resource ARN/ID extraction complete ==="
          ID_COUNT=$(wc -l < "$RESOURCE_FILE" | tr -d ' ' | head -1)
          ARN_COUNT=$(grep -c '|arn|' "$RESOURCE_FILE" 2>/dev/null | head -1)
          # Ensure variables are valid integers (default to 0 if empty)
          ID_COUNT=${ID_COUNT:-0}
          ARN_COUNT=${ARN_COUNT:-0}
          echo "Resources resolved: $ID_COUNT / $ADDR_COUNT ($ARN_COUNT ARNs, $((ID_COUNT - ARN_COUNT)) IDs)"
          cat "$RESOURCE_FILE"

      - name: Query CloudTrail for Attribution
        id: cloudtrail
        if: steps.plan.outputs.exit_code == '2'
        run: |
          echo "=== Step 2: Querying CloudTrail for actor attribution ==="
          RESOURCE_FILE="/tmp/resource_ids.txt"
          PLAN_FILE="${{ github.workspace }}/plan_output.txt"
          ATTRIBUTION_FILE="/tmp/attribution_table.md"
          ADDRESSES_FILE="/tmp/changed_addresses.txt"
          > "$ATTRIBUTION_FILE"

          # Helper function: extract actor info from a CloudTrail event JSON string
          extract_actor() {
            local event="$1"
            user_type=$(echo "$event" | jq -r '.userIdentity.type // "Unknown"')
            case "$user_type" in
              IAMUser)
                actor_name=$(echo "$event" | jq -r '.userIdentity.userName // "unknown"')
                actor_id=$(echo "$event" | jq -r '.userIdentity.arn // "unknown"')
                ;;
              AssumedRole)
                actor_name=$(echo "$event" | jq -r '
                  (.userIdentity.sessionContext.sessionIssuer.userName // "unknown") + 
                  "/" + 
                  (.userIdentity.arn | split("/") | last // "unknown")
                ')
                actor_id=$(echo "$event" | jq -r '.userIdentity.arn // "unknown"')
                ;;
              Root)
                actor_name="ROOT ACCOUNT"
                actor_id=$(echo "$event" | jq -r '.userIdentity.arn // "unknown"')
                ;;
              AWSService)
                actor_name=$(echo "$event" | jq -r '"AWS Service: " + (.userIdentity.invokedBy // "unknown")')
                actor_id=$(echo "$event" | jq -r '.userIdentity.invokedBy // "unknown"')
                ;;
              *)
                actor_name=$(echo "$event" | jq -r '.userIdentity.userName // (.userIdentity.arn | split("/") | last) // "unknown"')
                actor_id=$(echo "$event" | jq -r '.userIdentity.arn // .userIdentity.principalId // "unknown"')
                ;;
            esac
          }

          # Map Terraform resource type to CloudTrail delete event name
          get_delete_event_name() {
            local tf_type="$1"
            case "$tf_type" in
              aws_vpc) echo "DeleteVpc" ;;
              aws_subnet) echo "DeleteSubnet" ;;
              aws_instance) echo "TerminateInstances" ;;
              aws_security_group) echo "DeleteSecurityGroup" ;;
              aws_iam_role) echo "DeleteRole" ;;
              aws_iam_instance_profile) echo "DeleteInstanceProfile" ;;
              aws_iam_role_policy_attachment) echo "DetachRolePolicy" ;;
              aws_route_table) echo "DeleteRouteTable" ;;
              aws_internet_gateway) echo "DeleteInternetGateway" ;;
              aws_ec2_transit_gateway) echo "DeleteTransitGateway" ;;
              aws_ec2_transit_gateway_vpc_attachment) echo "DeleteTransitGatewayVpcAttachment" ;;
              *) echo "" ;;
            esac
          }

          # Add table header
          echo "### Drift Attribution Analysis" >> "$ATTRIBUTION_FILE"
          echo "" >> "$ATTRIBUTION_FILE"
          echo "| Resource | Action | Actor Name | Actor ID | Event Time |" >> "$ATTRIBUTION_FILE"
          echo "|---|---|---|---|---|" >> "$ATTRIBUTION_FILE"

          FOUND_COUNT=0
          MISS_COUNT=0
          START_TIME=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          # Process resources that have ARNs/IDs resolved
          if [ -f "$RESOURCE_FILE" ] && [ -s "$RESOURCE_FILE" ]; then
            while IFS='|' read -r address id_type resource_identifier; do
               if [ -z "$resource_identifier" ] || [ "$resource_identifier" == "null" ]; then
                  echo "| \`$address\` | - | - | *(ARN/ID not resolved)* | - |" >> "$ATTRIBUTION_FILE"
                  MISS_COUNT=$((MISS_COUNT + 1))
                  continue
               fi

               echo "Querying CloudTrail for: $resource_identifier ($address, type: $id_type)..."
               
               # CloudTrail lookup-events ResourceName attribute documentation:
               # https://docs.aws.amazon.com/awscloudtrail/latest/userguide/view-cloudtrail-events-cli.html
               # ResourceName typically expects AWS resource IDs (e.g., vpc-xxx, subnet-xxx, i-xxx)
               # For some services, it may also accept ARNs, but resource IDs are more reliable
               
               # Extract resource ID from ARN if we have an ARN
               query_value="$resource_identifier"
               if [ "$id_type" = "arn" ]; then
                 # Try to extract resource ID from ARN
                 # ARN formats vary by service:
                 # - arn:partition:service:region:account:resource-type/resource-id (e.g., EC2, VPC)
                 # - arn:partition:service:region:account:resource-type:resource-id (e.g., IAM)
                 # - arn:partition:s3:::bucket-name (S3 buckets)
                 # - arn:partition:s3:::bucket-name/key (S3 objects)
                 
                 # For most AWS resources in this drift detection (VPC, EC2, subnets, etc.),
                 # the resource ID is after the last / or : separator
                 # Extract the part after the last colon, then take first part before any /
                 resource_part=$(echo "$resource_identifier" | sed 's/.*://')
                 # Now extract just the resource ID (before any path separators)
                 resource_id=$(echo "$resource_part" | sed 's/\/.*//')
                 
                 if [ -n "$resource_id" ] && [ "$resource_id" != "$resource_identifier" ]; then
                   echo "  Extracted resource ID from ARN: $resource_id"
                   # Try query with resource ID first
                   echo "  Querying CloudTrail with resource ID: $resource_id"
                   event=$(aws cloudtrail lookup-events \
                     --lookup-attributes AttributeKey=ResourceName,AttributeValue="$resource_id" \
                     --start-time "$START_TIME" \
                     --max-results 1 \
                     --query 'Events[0].CloudTrailEvent' --output text 2>/dev/null) || true
                   
                   # If no result, try with full ARN as fallback
                   if [ -z "$event" ] || [ "$event" = "None" ] || [ "$event" = "null" ]; then
                     echo "  No event found with resource ID, trying with full ARN: $resource_identifier"
                     event=$(aws cloudtrail lookup-events \
                       --lookup-attributes AttributeKey=ResourceName,AttributeValue="$resource_identifier" \
                       --start-time "$START_TIME" \
                       --max-results 1 \
                       --query 'Events[0].CloudTrailEvent' --output text 2>/dev/null) || true
                   fi
                 else
                   # Couldn't extract ID from ARN, use ARN directly
                   echo "  Querying CloudTrail with ARN: $resource_identifier"
                   event=$(aws cloudtrail lookup-events \
                     --lookup-attributes AttributeKey=ResourceName,AttributeValue="$resource_identifier" \
                     --start-time "$START_TIME" \
                     --max-results 1 \
                     --query 'Events[0].CloudTrailEvent' --output text 2>/dev/null) || true
                 fi
               else
                 # For IDs, use ResourceName attribute directly
                 # This should be an AWS resource ID (vpc-xxx, subnet-xxx, etc.), not a Terraform name
                 echo "  Querying CloudTrail with resource ID: $resource_identifier"
                 event=$(aws cloudtrail lookup-events \
                   --lookup-attributes AttributeKey=ResourceName,AttributeValue="$resource_identifier" \
                   --start-time "$START_TIME" \
                   --max-results 1 \
                   --query 'Events[0].CloudTrailEvent' --output text 2>/dev/null) || true
               fi
               
               if [ -n "$event" ] && [ "$event" != "None" ] && [ "$event" != "null" ]; then
                  extract_actor "$event"
                  time=$(echo "$event" | jq -r '.eventTime // "-"')
                  eventName=$(echo "$event" | jq -r '.eventName // "Unknown"')
                  sourceIp=$(echo "$event" | jq -r '.sourceIPAddress // "-"')
                  
                  echo "  ✅ Found: $actor_name ($eventName) from $sourceIp at $time"
                  echo "| \`$address\` | $eventName | **$actor_name** | \`$actor_id\` | $time |" >> "$ATTRIBUTION_FILE"
                  FOUND_COUNT=$((FOUND_COUNT + 1))
               else
                  echo "  ❌ No CloudTrail event found for $resource_identifier"
                  echo "| \`$address\` | - | - | *(No CloudTrail event found)* | - |" >> "$ATTRIBUTION_FILE"
                  MISS_COUNT=$((MISS_COUNT + 1))
               fi
               
               sleep 0.5
            done < "$RESOURCE_FILE"
          fi

          # For resources with no ARNs/IDs at all, try CloudTrail event name lookup
          # This handles "will be created" drift where resources were deleted from AWS
          if [ -f "$ADDRESSES_FILE" ]; then
            # Build set of addresses that already have ARNs/IDs
            declare -A HAS_ID
            if [ -f "$RESOURCE_FILE" ] && [ -s "$RESOURCE_FILE" ]; then
              while IFS='|' read -r addr id_type resource_identifier; do
                HAS_ID["$addr"]=1
              done < "$RESOURCE_FILE"
            fi

            while read -r address; do
              [ -z "$address" ] && continue
              [ -n "${HAS_ID[$address]+x}" ] && continue

              # Extract resource type from address (e.g., module.xxx.aws_subnet.this → aws_subnet)
              tf_type=$(echo "$address" | grep -oE 'aws_[a-z0-9_]+' | tail -1)
              delete_event=$(get_delete_event_name "$tf_type")

              if [ -n "$delete_event" ]; then
                echo "Trying CloudTrail EventName lookup: $delete_event for $address..."
                event=$(aws cloudtrail lookup-events \
                  --lookup-attributes AttributeKey=EventName,AttributeValue="$delete_event" \
                  --start-time "$START_TIME" \
                  --max-results 1 \
                  --query 'Events[0].CloudTrailEvent' --output text 2>/dev/null) || true

                if [ -n "$event" ] && [ "$event" != "None" ] && [ "$event" != "null" ]; then
                  extract_actor "$event"
                  time=$(echo "$event" | jq -r '.eventTime // "-"')
                  eventName=$(echo "$event" | jq -r '.eventName // "Unknown"')

                  echo "  ✅ Found (via event name): $actor_name ($eventName) at $time"
                  echo "| \`$address\` | $eventName | **$actor_name** | \`$actor_id\` | $time |" >> "$ATTRIBUTION_FILE"
                  FOUND_COUNT=$((FOUND_COUNT + 1))
                else
                  echo "  ❌ No $delete_event events found in CloudTrail"
                  echo "| \`$address\` | - | - | *(No CloudTrail event found)* | - |" >> "$ATTRIBUTION_FILE"
                  MISS_COUNT=$((MISS_COUNT + 1))
                fi
                sleep 0.5
              else
                echo "  ⚠️ No CloudTrail event mapping for resource type: $tf_type ($address)"
                echo "| \`$address\` | - | - | *(No ID or event mapping)* | - |" >> "$ATTRIBUTION_FILE"
                MISS_COUNT=$((MISS_COUNT + 1))
              fi
            done < "$ADDRESSES_FILE"
          fi

          echo "" >> "$ATTRIBUTION_FILE"
          echo "> ℹ️ Attribution found for $FOUND_COUNT/$((FOUND_COUNT + MISS_COUNT)) resources. Events older than 90 days cannot be queried." >> "$ATTRIBUTION_FILE"
          
          echo ""
          echo "=== Attribution complete: $FOUND_COUNT found, $MISS_COUNT missing ==="
          cat "$ATTRIBUTION_FILE"

      - name: Generate issue body
        id: issue_body
        if: steps.plan.outputs.drift_detected == 'true'
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CREATE_COUNT: ${{ steps.parse.outputs.create_count }}
          UPDATE_COUNT: ${{ steps.parse.outputs.update_count }}
          DELETE_COUNT: ${{ steps.parse.outputs.delete_count }}
          REPLACE_COUNT: ${{ steps.parse.outputs.replace_count }}
          TOTAL_COUNT: ${{ steps.parse.outputs.total_count }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get plan text output (truncated)
          PLAN_OUTPUT=$(head -200 ${{ github.workspace }}/plan_output.txt)
          
          # Read attribution table
          if [ -f /tmp/attribution_table.md ]; then
            ATTRIBUTION_SECTION=$(cat /tmp/attribution_table.md)
          else
            ATTRIBUTION_SECTION="No attribution data available."
          fi
          
          # Create issue body
          cat > /tmp/issue_body.md << EOF
          ## Drift Detection Report

          | Field | Value |
          |-------|-------|
          | **Environment** | ${ENVIRONMENT} |
          | **Detected At** | ${TIMESTAMP} |
          | **Workflow Run** | [${RUN_ID}](${RUN_URL}) |

          ---

          ### Summary

          | Metric | Count |
          |--------|-------|
          | 🆕 Creates | ${CREATE_COUNT} |
          | 📝 Updates | ${UPDATE_COUNT} |
          | 🗑️ Deletes | ${DELETE_COUNT} |
          | 🔄 Replaces | ${REPLACE_COUNT} |
          | **Total** | **${TOTAL_COUNT}** |

          ---

          ${ATTRIBUTION_SECTION}

          ---

          ### Terraform Plan Output

          <details>
          <summary>Click to expand full plan output</summary>

          \`\`\`hcl
          ${PLAN_OUTPUT}
          \`\`\`

          </details>

          ---

          ### Remediation Options

          #### Option 1: Accept Drift (Update Terraform)
          \`\`\`bash
          cd terraform/${ENVIRONMENT}
          terraform plan
          \`\`\`

          #### Option 2: Revert Drift (Apply Terraform)
          \`\`\`bash
          cd terraform/${ENVIRONMENT}
          terraform apply
          \`\`\`

          ---

          *This issue was automatically created by the [drift detection workflow](${RUN_URL}).*
          EOF
          
          echo "Issue body generated"

      - name: Create GitHub Issue
        id: create_issue
        if: steps.plan.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          ISSUE_URL=$(gh issue create \
            --title "🔴 Terraform Drift Detected - ${ENVIRONMENT} - ${DATE}" \
            --body-file /tmp/issue_body.md \
            --label "drift,infrastructure,automated,${ENVIRONMENT}")
          
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          echo "✅ Created issue: $ISSUE_URL"

      - name: Generate Drift Report JSON
        id: drift_report
        if: steps.plan.outputs.drift_detected == 'true'
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CREATE_COUNT: ${{ steps.parse.outputs.create_count }}
          UPDATE_COUNT: ${{ steps.parse.outputs.update_count }}
          DELETE_COUNT: ${{ steps.parse.outputs.delete_count }}
          REPLACE_COUNT: ${{ steps.parse.outputs.replace_count }}
        run: |
          PLAN_FILE="${{ github.workspace }}/plan_output.txt"
          REPORT_FILE="/tmp/drift_report.json"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build resource_changes array from plan output
          CHANGES="[]"
          while IFS= read -r line; do
            addr=$(echo "$line" | sed -E 's/^\s+#\s(\S+)\s+(will be|must be|has changed).*/\1/')
            [ -z "$addr" ] && continue
            # Extract resource type from address (last aws_xxx segment)
            rtype=$(echo "$addr" | grep -oE 'aws_[a-z0-9_]+' | tail -1)
            [ -z "$rtype" ] && rtype="unknown"
            # Extract resource name (last dotted segment)
            rname=$(echo "$addr" | grep -oE '[^.]+$')
            [ -z "$rname" ] && rname="unknown"
            # Determine action
            if echo "$line" | grep -q "will be created"; then action="create"
            elif echo "$line" | grep -q "will be updated"; then action="update"
            elif echo "$line" | grep -q "will be destroyed"; then action="delete"
            elif echo "$line" | grep -q "must be replaced"; then action="replace"
            else action="update"
            fi
            CHANGES=$(echo "$CHANGES" | jq --arg rt "$rtype" --arg rn "$rname" --arg act "$action" \
              '. + [{"resource_type": $rt, "resource_name": $rn, "action": $act}]')
          done < <(grep -E '^\s+#\s.+\s(will be|must be|has changed)' "$PLAN_FILE" || true)

          DRIFT_DETECTED=true
          CHANGE_COUNT=$(echo "$CHANGES" | jq 'length')
          if [ "$CHANGE_COUNT" -eq 0 ]; then
            DRIFT_DETECTED=false
          fi

          # Write JSON report
          jq -n \
            --arg ts "$TIMESTAMP" \
            --arg env "$ENVIRONMENT" \
            --arg branch "${GITHUB_REF_NAME:-unknown}" \
            --arg run_id "$RUN_ID" \
            --arg run_url "$RUN_URL" \
            --argjson drift "$DRIFT_DETECTED" \
            --argjson changes "$CHANGES" \
            '{
              timestamp: $ts,
              environment: $env,
              branch: $branch,
              workflow_run_id: $run_id,
              workflow_run_url: $run_url,
              drift_detected: $drift,
              resource_changes: $changes
            }' > "$REPORT_FILE"

          echo "✅ Drift report JSON generated at $REPORT_FILE ($CHANGE_COUNT changes)"

      - name: Send Telegram Notification
        if: steps.plan.outputs.drift_detected == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd scripts/drift-detection
          # Check if the script exists
          if [ -f notify_telegram.py ]; then
            python notify_telegram.py \
              --report /tmp/drift_report.json \
              --environment ${{ github.event.inputs.environment || 'dev' }} \
              --run-id ${{ github.run_id }}
          else
             echo "notify_telegram.py not found, skipping notification"
          fi

      - name: Workflow Summary
        run: |
          if [ "${{ steps.plan.outputs.drift_detected }}" = "true" ]; then
            echo "## ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Infrastructure drift was detected in the **${{ github.event.inputs.environment || 'dev' }}** environment." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📋 **Issue Created**: ${{ steps.create_issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Infrastructure in **${{ github.event.inputs.environment || 'dev' }}** matches the Terraform state." >> $GITHUB_STEP_SUMMARY
          fi
