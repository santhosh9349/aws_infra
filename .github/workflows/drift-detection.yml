name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 AM UTC

  repository_dispatch:
    types: [drift-check]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check for drift'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  TF_VERSION: '1.5.7'
  AWS_REGION: 'eu-west-2'
  TF_CLOUD_ORGANIZATION: 'santhosh9349'
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Terraform Drift Scan
  # - Upload config to Terraform Cloud via API
  # - Run speculative plan via TFC API (handles state lock, retries)
  # - Get structured plan output (add/change/destroy counts)
  # - Parse JSON stream for resource IDs/ARNs
  # - Upload scan artifacts for downstream jobs
  # ═══════════════════════════════════════════════════════════════
  terraform-drift-scan:
    name: Terraform Drift Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    outputs:
      drift_detected: ${{ steps.drift-check.outputs.drift_detected }}
      create_count: ${{ steps.plan-output.outputs.add }}
      update_count: ${{ steps.plan-output.outputs.change }}
      delete_count: ${{ steps.plan-output.outputs.destroy }}
      total_count: ${{ steps.totals.outputs.total_count }}
      plan_status: ${{ steps.plan-output.outputs.plan_status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017373135945:role/github_oidc_drift
          role-session-name: DriftDetectionSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Configuration to TFC
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          workspace: tf_${{ github.event.inputs.environment || 'dev' }}
          directory: terraform/${{ github.event.inputs.environment || 'dev' }}
          speculative: true

      - name: Create Plan Run in TFC
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          workspace: tf_${{ github.event.inputs.environment || 'dev' }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true
          message: "Drift Detection - ${{ github.event.inputs.environment || 'dev' }} - Run ${{ github.run_id }}"

      - name: Get Plan Output from TFC
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.3.2
        id: plan-output
        with:
          plan: ${{ steps.run.outputs.plan_id }}

      - name: Determine Drift Status
        id: drift-check
        run: |
          ADD="${{ steps.plan-output.outputs.add }}"
          CHANGE="${{ steps.plan-output.outputs.change }}"
          DESTROY="${{ steps.plan-output.outputs.destroy }}"
          PLAN_STATUS="${{ steps.plan-output.outputs.plan_status }}"

          echo "Plan status: $PLAN_STATUS"
          echo "Resources: +$ADD ~$CHANGE -$DESTROY"

          if [ "$ADD" = "0" ] && [ "$CHANGE" = "0" ] && [ "$DESTROY" = "0" ]; then
            echo "✅ No drift detected"
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Drift detected"
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Calculate Totals
        id: totals
        run: |
          ADD="${{ steps.plan-output.outputs.add }}"
          CHANGE="${{ steps.plan-output.outputs.change }}"
          DESTROY="${{ steps.plan-output.outputs.destroy }}"
          TOTAL=$((ADD + CHANGE + DESTROY))
          echo "total_count=$TOTAL" >> $GITHUB_OUTPUT

      - name: Setup Terraform (for JSON plan)
        if: steps.drift-check.outputs.drift_detected == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Generate JSON Plan for Resource Parsing
        if: steps.drift-check.outputs.drift_detected == 'true'
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: |
          terraform init -input=false
          terraform plan -json -input=false 2>&1 > /tmp/plan_stream.jsonl || true
          cp /tmp/plan_stream.jsonl ${{ github.workspace }}/plan_stream.jsonl

      - name: Parse Plan JSON Stream
        if: steps.drift-check.outputs.drift_detected == 'true'
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: |
          bash ${{ github.workspace }}/scripts/drift-detection/generate-plan-json.sh \
            ${{ github.workspace }}/plan_stream.jsonl \
            /tmp/plan.json

      - name: Parse Terraform Plan for Resource IDs
        id: parse
        if: steps.drift-check.outputs.drift_detected == 'true'
        run: |
          bash scripts/drift-detection/parse-terraform-plan.sh \
            /tmp/plan.json \
            /tmp/drift_resources.txt

          cp /tmp/drift_resources.txt ${{ github.workspace }}/drift_resources.txt

      - name: Upload Drift Scan Artifacts
        if: steps.drift-check.outputs.drift_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-scan-data
          path: |
            ${{ github.workspace }}/plan_stream.jsonl
            ${{ github.workspace }}/drift_resources.txt
          retention-days: 7
          if-no-files-found: warn

      - name: No Drift Summary
        if: steps.drift-check.outputs.drift_detected == 'false'
        run: |
          echo "## ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure in **${{ github.event.inputs.environment || 'dev' }}** matches the Terraform state." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **TFC Run**: ${{ steps.run.outputs.run_link }}" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: CloudTrail Lookup
  # - Download drift scan artifacts (resource IDs/ARNs)
  # - Connect AWS CloudTrail API
  # - Lookup events per drifted resource
  # - Find actor/who/when for each change
  # - Upload attribution artifacts
  # ═══════════════════════════════════════════════════════════════
  cloudtrail-lookup:
    name: CloudTrail Lookup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: terraform-drift-scan
    if: needs.terraform-drift-scan.outputs.drift_detected == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017373135945:role/github_oidc_drift
          role-session-name: CloudTrailLookupSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Drift Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          name: drift-scan-data
          path: /tmp/drift-scan

      - name: Query CloudTrail for Attribution
        run: |
          bash scripts/drift-detection/query-cloudtrail.sh \
            /tmp/drift-scan/drift_resources.txt \
            /tmp/drift_resources_attributed.txt

          # Generate attribution table in Markdown format for GitHub Issue
          echo "### Drift Attribution Analysis" > /tmp/attribution_table.md
          echo "" >> /tmp/attribution_table.md
          echo "| Resource | Action | Actor Name | Actor ARN | Event Time |" >> /tmp/attribution_table.md
          echo "|---|---|---|---|---|" >> /tmp/attribution_table.md

          while IFS='|' read -r address action resource_type identifier actor_name actor_arn event_time; do
            [ -z "$address" ] && continue

            if [ "$actor_name" = "*(unavailable)*" ] || [ -z "$actor_name" ] || [ "$actor_name" = "-" ]; then
              actor_display="*(No CloudTrail event found)*"
              arn_display="-"
              time_display="-"
            else
              actor_display="**${actor_name}**"
              arn_display="\`${actor_arn}\`"
              time_display="$event_time"
            fi

            echo "| \`$address\` | $action | $actor_display | $arn_display | $time_display |" >> /tmp/attribution_table.md
          done < /tmp/drift_resources_attributed.txt

          echo "" >> /tmp/attribution_table.md
          echo "> ℹ️ CloudTrail lookup performed. Events older than 7 days cannot be queried." >> /tmp/attribution_table.md

          echo "Attribution table generated"
          cat /tmp/attribution_table.md

      - name: Upload CloudTrail Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudtrail-data
          path: |
            /tmp/drift_resources_attributed.txt
            /tmp/attribution_table.md
          retention-days: 7
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Create GitHub Issue & Notify
  # - Download drift scan + CloudTrail artifacts
  # - Generate documented GitHub issue with combined data
  # - Send Telegram notification
  # - Upload final drift report
  # ═══════════════════════════════════════════════════════════════
  create-github-issue:
    name: Create GitHub Issue & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [terraform-drift-scan, cloudtrail-lookup]
    if: needs.terraform-drift-scan.outputs.drift_detected == 'true'

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          cd scripts/drift-detection
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping"
          fi

      - name: Download Drift Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          name: drift-scan-data
          path: /tmp/drift-scan

      - name: Download CloudTrail Artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudtrail-data
          path: /tmp/cloudtrail

      - name: Generate Issue Body
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ADD_COUNT: ${{ needs.terraform-drift-scan.outputs.create_count }}
          CHANGE_COUNT: ${{ needs.terraform-drift-scan.outputs.update_count }}
          DESTROY_COUNT: ${{ needs.terraform-drift-scan.outputs.delete_count }}
          TOTAL_COUNT: ${{ needs.terraform-drift-scan.outputs.total_count }}
          PLAN_STATUS: ${{ needs.terraform-drift-scan.outputs.plan_status }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -f /tmp/cloudtrail/attribution_table.md ]; then
            ATTRIBUTION_SECTION=$(cat /tmp/cloudtrail/attribution_table.md)
          else
            ATTRIBUTION_SECTION="No attribution data available."
          fi

          cat > /tmp/issue_body.md << EOF
          ## Drift Detection Report

          | Field | Value |
          |-------|-------|
          | **Environment** | ${ENVIRONMENT} |
          | **Detected At** | ${TIMESTAMP} |
          | **Plan Status** | ${PLAN_STATUS} |
          | **Workflow Run** | [${RUN_ID}](${RUN_URL}) |

          ---

          ### Summary

          | Metric | Count |
          |--------|-------|
          | 🆕 Add | ${ADD_COUNT} |
          | 📝 Change | ${CHANGE_COUNT} |
          | 🗑️ Destroy | ${DESTROY_COUNT} |
          | **Total** | **${TOTAL_COUNT}** |

          ---

          ${ATTRIBUTION_SECTION}

          ---

          ### Remediation Options

          #### Option 1: Accept Drift (Update Terraform)
          \`\`\`bash
          cd terraform/${ENVIRONMENT}
          terraform plan
          \`\`\`

          #### Option 2: Revert Drift (Apply Terraform)
          \`\`\`bash
          cd terraform/${ENVIRONMENT}
          terraform apply
          \`\`\`

          ---

          *This issue was automatically created by the [drift detection workflow](${RUN_URL}).*
          EOF

          echo "Issue body generated"

      - name: Create GitHub Issue
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          ISSUE_URL=$(gh issue create \
            --title "🔴 Terraform Drift Detected - ${ENVIRONMENT} - ${DATE}" \
            --body-file /tmp/issue_body.md \
            --label "drift,infrastructure,automated,${ENVIRONMENT}")

          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          echo "✅ Created issue: $ISSUE_URL"

      - name: Generate Drift Report JSON
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          bash scripts/drift-detection/generate-drift-report.sh \
            /tmp/cloudtrail/drift_resources_attributed.txt \
            /tmp/drift_report.json

          echo "✅ Drift report JSON generated"

      - name: Send Telegram Notification
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd scripts/drift-detection
          if [ -f notify_telegram.py ]; then
            python notify_telegram.py \
              --report /tmp/drift_report.json \
              --environment ${{ github.event.inputs.environment || 'dev' }} \
              --run-id ${{ github.run_id }}
          else
            echo "notify_telegram.py not found, skipping notification"
          fi

      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: /tmp/drift_report.json
          retention-days: 7
          if-no-files-found: warn

      - name: Trigger AI Analysis (Optional)
        if: vars.ENABLE_AI_DRIFT_ANALYSIS == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Triggering AI-powered drift analysis workflow..."
          gh workflow run drift-analysis.lock.yml \
            -f environment="${{ github.event.inputs.environment || 'dev' }}" \
            || echo "⚠️ AI analysis workflow not available or failed to trigger"

      - name: Drift Summary
        run: |
          echo "## ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure drift was detected in the **${{ github.event.inputs.environment || 'dev' }}** environment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Issue Created**: ${{ steps.create_issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY
